<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="IMG/play button.png">
    <link rel="stylesheet" href="styles.css">
    <title>Duck project</title>

</head>
<body>
    

<div class="player">

    <img id="songimage">
    <div class="songinfo">
        <div class="nowplaying">Now Playing:</div>
        <div id="songname">Name: </div>
        <br>
    <div class="nowplaying">Artist:</div>
    <div id="artistname">Artist: </div>
</div>
    
    <div class="sliderandbuttons">
     <input id="slidersong" type="range" step="any" min="0" max="100">
       <div id="volumelol">
        <img id="volumebutton" src="img/volume.png" alt="volume">
       </div> 
     <input id="volumeslider" type="range" step="0.001" min="0" max="1">
    </div>

    <div id="musicbuttons">
        <div id="shufflingimg"><img id="shufflesong" src="img/shuffle button off.png" alt="shuffle button"></div>
        <img id="previoussong" src="img/back button.png" alt="previous button">
        <img id="playsong" src="img/play button.png" alt="play button">
        <img id="pausesong" src="img/pause button.png" alt="pause button">
        <img id="nextsong" src="img/forward button.png" alt="next button">
        <div id="loopbuttonimg"><img id="loopsong" src="img/loop button.png" alt="loop button"></div> 
    </div>

    </div>
    
    <div class="audio">
        <script src="music_player.js"></script>
    </div>
</div>


<div class="ducks" id="effectscontainer">

    
<div id="imnoise">
    <input id="slidereffects" type="range" step="0.001" min="0" max="1" value="0.5">
</div>

   <button onclick="Play1()">
    Waves 
    <audio class="soundeffects" id="waves" loop="true" src="/Soundscapes/30 min relaxing ocean waves - high quality sound - no music - HD video of a beautiful misty beach (128kbit_AAC).m4a">

    </audio>

    </button>


   <button onclick="Play2()">
    Rain 
    <audio class="soundeffects" id="rain" loop="true" src="/Soundscapes/5 Minutes of Rain and Thunderstorm.m4a">

    </audio>
   </button>

   <button >3</button>
   <button >4</button>
<script src="effects.js"></script>
  
</div>



<div class="image">
    <img src="img/the floating duck.gif" alt="the floating duck">
</div>

</body>
</html>


<script>
var waveplay = 0;
var thenoise = document.getElementById("waves");
function Play1(){
    if (waveplay==0){
 thenoise.play();
 waveplay = 1;
 console.log("the waves they swoosh");
}
 else if (waveplay==1){
 thenoise.pause();
 waveplay = 0;
 console.log("no waves for me");
 }
};

var rainplay = 0;
var rainnoise = document.getElementById("rain");
function Play2(){
    if (rainplay==0){
 rainnoise.play();
 rainplay = 1;
 console.log("the rain falls down");
}
 else if (rainplay==1){
 rainnoise.pause();
 rainplay = 0;
 console.log("no rain for me");
 }
}
</script>
